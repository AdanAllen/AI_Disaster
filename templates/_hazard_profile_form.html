<form method="post" action="{{ url_for('save_hazard_profile') }}" class="hazard-profile-form">
    <input type="hidden" name="next_url" value="{{ request.path }}">
    <div class="row g-3 align-items-end">
        <div class="col-md-4">
            <label for="housing" class="form-label fw-semibold">Housing</label>
            <select class="form-select" id="housing" name="housing">
                <option value="">Select</option>
                <option value="renter" {% if user_profile.housing == 'renter' %}selected{% endif %}>Renter</option>
                <option value="homeowner" {% if user_profile.housing == 'homeowner' %}selected{% endif %}>Homeowner</option>
            </select>
        </div>
        <div class="col-md-4">
            <label for="age" class="form-label fw-semibold">Age</label>
            <input
                class="form-control"
                id="age"
                name="age"
                type="number"
                min="0"
                inputmode="numeric"
                placeholder="Optional"
                value="{{ user_profile.age if user_profile.age is not none else '' }}"
            >
        </div>
        <div class="col-md-4">
            <label for="location" class="form-label fw-semibold">Location</label>
            <select class="form-select" id="location" name="location">
                <option value="">Select</option>
                {% for option in location_options %}
                <option value="{{ option.value }}" {% if user_profile.location == option.value %}selected{% endif %}>{{ option.label }}</option>
                {% endfor %}
            </select>
        </div>
    </div>
    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mt-3">
        <p class="profile-helper mb-0">
            Personalization rules: renters get evacuation-first steps, age 65+ adds medical and mobility steps, and hills raises wildfire priority.
        </p>
        <button type="submit" class="btn btn-primary px-4">
            <i class="fas fa-sliders me-2"></i>Update Profile
        </button>
    </div>
</form>
