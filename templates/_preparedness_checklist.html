<section class="preparedness-section" aria-labelledby="preparedness-title">
    <div class="preparedness-card">
        <div class="preparedness-header">
            <div>
                <div class="preparedness-eyebrow">Preparedness</div>
                <h2 id="preparedness-title" class="preparedness-title">Basic Preparedness Checklist</h2>
                <p class="preparedness-note mb-0">Completing these steps improves your preparedness.</p>
            </div>
            <div class="preparedness-progress-text">
                <span id="preparedness-complete-count">0</span> / <span id="preparedness-total-count">{{ checklist_items|length }}</span> completed
            </div>
        </div>

        <div class="preparedness-progress" aria-hidden="true">
            <div id="preparedness-progress-bar" class="preparedness-progress-bar"></div>
        </div>

        <div class="preparedness-list" data-checklist-storage-key="preparednessChecklist">
            {% for item in checklist_items %}
            <label class="preparedness-item" data-item-id="{{ item.id }}">
                <input type="checkbox" class="preparedness-checkbox" data-item-id="{{ item.id }}">
                <span class="preparedness-checkmark">
                    <i class="fas fa-check"></i>
                </span>
                <span class="preparedness-label">{{ item.label }}</span>
            </label>
            {% endfor %}
        </div>
    </div>
</section>
